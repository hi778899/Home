<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- 适配阿里云 ESA Pages 的缓存与SEO优化 -->
    <meta http-equiv="Cache-Control" content="public, max-age=86400">
    <meta name="robots" content="noindex, nofollow">
    <title>星空间 - 网站维护中</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面主体样式 */
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
            color: #333;
            padding: 20px;
            /* 避免阿里云Pages默认margin影响 */
            margin: 0 !important;
        }

        /* 维护提示文本样式 */
        .maintenance-text {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #555;
        }

        /* 页脚样式 - 适配阿里云Pages的布局 */
        footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            /* 防止被遮挡 */
            z-index: 10;
        }

        /* 备案链接样式 */
        footer a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #333;
        }

        /* 响应式适配 - 小屏幕调整 */
        @media (max-width: 480px) {
            .maintenance-text {
                font-size: 1.2rem;
            }
            footer {
                font-size: 0.8rem;
                bottom: 15px;
            }
        }

        /* 针对阿里云ESA Pages的边缘情况适配 */
        @media (max-height: 400px) {
            footer {
                position: static;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <p class="maintenance-text">网站维护中，敬请期待</p>

    <footer>
        <p><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">冀ICP备2021002358号-3</a></p>
    </footer>
</body>

</html>
